<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Belajar HTML Editor</title>
    <style>
      /* CSS Variables */
      :root {
        --primary-color: #04aa6d;
        --bg-dark: #1e1e1e;
        --text-light: #d4d4d4;
        --white: #ffffff;
        --shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        height: 100vh;
        overflow: hidden;
      }

      .toolbar {
        background: var(--primary-color);
        padding: 10px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        overflow-x: auto;
      }

      .toolbar button {
        background: var(--white);
        border: none;
        padding: 6px 10px;
        cursor: pointer;
        border-radius: 4px;
        font-size: 14px;
        white-space: nowrap;
        transition: background 0.2s;
      }

      .toolbar button:hover {
        background: #e0e0e0;
      }

      .container {
        display: flex;
        height: calc(100vh - 50px);
      }

      .editor-wrapper {
        position: relative;
        width: 50%;
        height: 100%;
      }

      #code,
      #highlight {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        padding: 10px;
        font-family: "Consolas", "Monaco", monospace;
        white-space: pre;
        word-wrap: normal;
        overflow: auto;
        line-height: 1.5;
        font-size: 16px;
        margin: 0;
      }

      #code {
        background: transparent;
        color: transparent;
        caret-color: var(--white);
        z-index: 2;
        border: none;
        outline: none;
        resize: none;
      }

      #highlight {
        background: var(--bg-dark);
        color: var(--white);
        z-index: 1;
        pointer-events: none;
        user-select: none;
      }

      /* Syntax Highlighting */
      .tag {
        color: #569cd6;
      }
      .attr {
        color: #9cdcfe;
      }
      .value {
        color: #ce9178;
      }
      .text {
        color: var(--text-light);
      }
      .comment {
        color: #6a9955;
      }

      #preview {
        width: 50%;
        border: none;
        background: var(--white);
      }

      /* Popup Menu */
      #popup {
        position: fixed;
        /* background: #33333300; */
        padding: 5px;
        border-radius: 5px;
        display: none;
        z-index: 1000;
        /* box-shadow: var(--shadow); */
        min-width: 150px;
      }

      #popup button {
        display: block;
        margin: 2px 0;
        background: var(--white);
        border: none;
        cursor: pointer;
        padding: 6px 10px;
        border-radius: 3px;
        width: 100%;
        text-align: left;
        font-size: 14px;
      }

      #popup button:hover {
        background: #ddd;
      }

      .submenu {
        display: none;
        position: absolute;
        left: 100%;
        top: 0;
        background: #444;
        padding: 5px;
        border-radius: 5px;
        box-shadow: var(--shadow);
        white-space: nowrap;
        z-index: 1001;
        min-width: 180px;
      }

      .submenu button {
        background: var(--white);
        margin: 2px 0;
      }

      .submenu button:hover {
        background: #666;
        color: var(--white);
      }
    </style>
  </head>
  <body>
    <!-- Toolbar -->
    <div class="toolbar" role="toolbar">
      <button title="Heading 1" onclick="Editor.insertTag('<h1></h1>')">H1</button>
      <button title="Heading 2" onclick="Editor.insertTag('<h2></h2>')">H2</button>
      <button title="Heading 3" onclick="Editor.insertTag('<h3></h3>')">H3</button>
      <button title="Paragraph" onclick="Editor.insertTag('<p></p>')">P</button>
      <button title="Div Container" onclick="Editor.insertTag('<div></div>')">DIV</button>
      <button title="Image" onclick="Editor.insertTag(`<img src='https://i.pinimg.com/736x/a2/f9/1c/a2f91c802c30cbf79e7b83cf65ee10db.jpg' alt='Gambar'>`)">IMG</button>
      <button title="Form" onclick="Editor.insertTag('<form></form>')">FORM</button>
      <button title="Text Input" onclick="Editor.insertTag(`<input type='text' placeholder='Nama'>`)">Text</button>
      <button title="Password" onclick="Editor.insertTag(`<input type='password' placeholder='Password'>`)">Password</button>
      <button title="Button" onclick="Editor.insertTag(`<input type='button' value='Submit'>`)">Button</button>
      <button title="Unordered List" onclick="Editor.insertTag('<ul><li>Item 1</li><li>Item 2</li></ul>')">UL</button>
      <button title="Ordered List" onclick="Editor.insertTag('<ol><li>Item 1</li><li>Item 2</li></ol>')">OL</button>
      <button title="Load Tutorial" onclick="Editor.loadTutorial()">Tutorial</button>
      <button title="Load Example" onclick="Editor.loadExample()">Example</button>
      <button title="Reset Code" onclick="Editor.reset()">Reset</button>
    </div>

    <!-- Main Container -->
    <div class="container">
      <div class="editor-wrapper" role="main">
        <pre id="highlight" aria-hidden="true"></pre>
        <textarea id="code" placeholder="Mulai mengetik HTML Anda di sini..." spellcheck="false" autocorrect="off" autocapitalize="off" aria-label="HTML Code Editor"></textarea>
      </div>
      <iframe id="preview" title="Live Preview"></iframe>
    </div>

    <!-- Context Menu -->
    <div id="popup" role="menu" aria-hidden="true">
      <div id="textMenu" role="menu">
        <button onclick="Editor.showSubmenu('textColorMenu')">Warna ▶</button>
        <button onclick="Editor.showSubmenu('textSizeMenu')">Ukuran ▶</button>
        <button onclick="Editor.showSubmenu('textWeightMenu')">Ketebalan ▶</button>
        <button onclick="Editor.showSubmenu('textAlignMenu')">Align ▶</button>
        <button onclick="Editor.showSubmenu('textStyleMenu')">Style ▶</button>
        <button onclick="Editor.insertListItem()">Tambah Item</button>
      </div>

      <div id="divMenu" role="menu">
        <button onclick="Editor.showSubmenu('posisiMenu')">Align ▶</button>
        <button onclick="Editor.showSubmenu('tataLetakMenu')">Display ▶</button>
        <button onclick="Editor.showSubmenu('warnaLatarMenu')">Background ▶</button>
        <button onclick="Editor.showSubmenu('pinggirMenu')">Border ▶</button>
        <button onclick="Editor.showSubmenu('sudutMenu')">Rounded ▶</button>
      </div>

      <div id="imgMenu" role="menu">
        <button onclick="Editor.showSubmenu('imgSizeMenu')">Ukuran ▶</button>
        <button onclick="Editor.showSubmenu('imgBorderMenu')">Border ▶</button>
        <button onclick="Editor.showSubmenu('imgMarginMenu')">Margin ▶</button>
      </div>

      <div id="formMenu" role="menu">
        <button onclick="Editor.showSubmenu('formStyleMenu')">Style ▶</button>
      </div>

      <div id="listMenu" role="menu">
        <button onclick="Editor.showSubmenu('listStyleMenu')">Style ▶</button>
      </div>

      <!-- Submenus (Text) -->
      <div id="textColorMenu" class="submenu">
        <button onclick="Editor.applyStyle('color:black;')">Hitam</button>
        <button onclick="Editor.applyStyle('color:var(--primary-color);')">Hijau</button>
        <button onclick="Editor.applyStyle('color:red;')">Merah</button>
        <button onclick="Editor.applyStyle('color:blue;')">Biru</button>
        <button onclick="Editor.applyStyle('color:#ff6b6b;')">Pink</button>
        <button onclick="Editor.applyStyle('color:#4ecdc4;')">Cyan</button>
        <button onclick="Editor.applyStyle('color:purple;')">Ungu</button>
      </div>

      <div id="textSizeMenu" class="submenu">
        <button onclick="Editor.applyStyle('font-size:12px;')">12px (Small)</button>
        <button onclick="Editor.applyStyle('font-size:16px;')">16px (Normal)</button>
        <button onclick="Editor.applyStyle('font-size:20px;')">20px</button>
        <button onclick="Editor.applyStyle('font-size:24px;')">24px</button>
        <button onclick="Editor.applyStyle('font-size:32px;')">32px (Large)</button>
        <button onclick="Editor.applyStyle('font-size:48px;')">48px (XL)</button>
      </div>

      <div id="textWeightMenu" class="submenu">
        <button onclick="Editor.applyStyle('font-weight:normal;')">Normal</button>
        <button onclick="Editor.applyStyle('font-weight:bold;')">Bold</button>
        <button onclick="Editor.applyStyle('font-weight:bolder;')">Bolder</button>
        <button onclick="Editor.applyStyle('font-weight:300;')">Light</button>
        <button onclick="Editor.applyStyle('font-weight:900;')">Black</button>
      </div>

      <div id="textAlignMenu" class="submenu">
        <button onclick="Editor.applyStyle('text-align:left;')">Left</button>
        <button onclick="Editor.applyStyle('text-align:center;')">Center</button>
        <button onclick="Editor.applyStyle('text-align:right;')">Right</button>
        <button onclick="Editor.applyStyle('text-align:justify;')">Justify</button>
      </div>

      <div id="textStyleMenu" class="submenu">
        <button onclick="Editor.applyStyle('font-style:italic;')">Italic</button>
        <button onclick="Editor.applyStyle('text-decoration:underline;')">Underline</button>
        <button onclick="Editor.applyStyle('text-decoration:line-through;')">Strikethrough</button>
        <button onclick="Editor.applyStyle('font-style:italic;font-weight:bold;text-decoration:underline;')">Italic+Bold+Underline</button>
        <button onclick="Editor.applyStyle('text-transform:uppercase;')">UPPERCASE</button>
        <button onclick="Editor.applyStyle('text-transform:lowercase;')">lowercase</button>
        <button onclick="Editor.applyStyle('text-transform:capitalize;')">Capitalize</button>
      </div>

      <!-- Submenus (Div) -->
      <div id="posisiMenu" class="submenu">
        <button onclick="Editor.applyStyle('justify-content:center;align-items:center;display:flex;')">Tengah (H+V)</button>
        <button onclick="Editor.applyStyle('justify-content:center;display:flex;')">Tengah Horizontal</button>
        <button onclick="Editor.applyStyle('align-items:center;display:flex;')">Tengah Vertikal</button>
        <button onclick="Editor.applyStyle('justify-content:space-between;display:flex;')">Penuh Lebar</button>
        <button onclick="Editor.applyStyle('justify-content:space-around;display:flex;')">Rata Jarak</button>
      </div>

      <div id="tataLetakMenu" class="submenu">
        <button onclick="Editor.applyStyle('display:flex;')">Flex (Baris)</button>
        <button onclick="Editor.applyStyle('display:flex;flex-direction:column;')">Flex (Kolom)</button>
        <button onclick="Editor.applyStyle('display:block;')">Block</button>
      </div>

      <div id="warnaLatarMenu" class="submenu">
        <button onclick="Editor.applyStyle('background:var(--primary-color);color:var(--white);')">Hijau UIN</button>
        <button onclick="Editor.applyStyle('background:#ff6b6b;color:var(--white);')">Merah</button>
        <button onclick="Editor.applyStyle('background:#4ecdc4;color:var(--white);')">Biru Muda</button>
        <button onclick="Editor.applyStyle('background:#333;color:var(--white);')">Hitam</button>
        <button onclick="Editor.applyStyle('background:linear-gradient(45deg,#ff6b6b,#4ecdc4);color:var(--white);')">Gradient</button>
        <button onclick="Editor.applyStyle('background:#f8f9fa;')">Kartu Abu</button>
      </div>

      <div id="pinggirMenu" class="submenu">
        <button onclick="Editor.applyStyle('border:2px solid #333;')">Pinggir Tebal</button>
        <button onclick="Editor.applyStyle('border:3px solid var(--primary-color);')">Pinggir Hijau</button>
        <button onclick="Editor.applyStyle('border-left:5px solid var(--primary-color);')">Garis Kiri</button>
        <button onclick="Editor.applyStyle('border-right:5px solid var(--primary-color);')">Garis Kanan</button>
        <button onclick="Editor.applyStyle('border:1px solid #ddd;')">Pinggir Tipis</button>
      </div>

      <div id="sudutMenu" class="submenu">
        <button onclick="Editor.applyStyle('border-radius:10px;padding:20px;background:#f0f0f0;margin:10px;width:200px;height:100px;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 15px rgba(0,0,0,0.1);')">
          Sudut Sedikit
        </button>
        <button
          onclick="Editor.applyStyle('border-radius:20px;padding:20px;background:var(--primary-color);color:var(--white);margin:10px;width:200px;height:100px;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 15px rgba(0,0,0,0.2);')"
        >
          Sudut Banyak
        </button>
        <button onclick="Editor.applyStyle('border-radius:50%;width:120px;height:120px;background:#ff6b6b;color:var(--white);display:flex;align-items:center;justify-content:center;margin:10px auto;box-shadow:0 5px 15px rgba(0,0,0,0.2);')">
          Lingkaran
        </button>
      </div>

      <!-- Submenus (Image, Form, List) -->
      <div id="imgSizeMenu" class="submenu">
        <button onclick="Editor.applyStyle('width:200px;height:auto;')">200px</button>
        <button onclick="Editor.applyStyle('width:300px;height:200px;object-fit:cover;')">300x200</button>
        <button onclick="Editor.applyStyle('width:100%;height:300px;object-fit:cover;')">Full Width</button>
      </div>
      <div id="imgBorderMenu" class="submenu">
        <button onclick="Editor.applyStyle('border:2px solid #333;border-radius:10px;padding:5px;')">Border+Radius</button>
        <button onclick="Editor.applyStyle('border-radius:50%;width:150px;height:150px;object-fit:cover;')">Circle</button>
      </div>
      <div id="imgMarginMenu" class="submenu">
        <button onclick="Editor.applyStyle('margin:20px auto;display:block;')">Center</button>
        <button onclick="Editor.applyStyle('margin:10px;')">Margin 10px</button>
      </div>
      <div id="formStyleMenu" class="submenu">
        <button onclick="Editor.applyStyle('padding:15px;border-radius:8px;border:1px solid #ccc;margin:5px 0;width:100%;box-sizing:border-box;')">Input Style</button>
        <button onclick="Editor.applyStyle('background:var(--primary-color);color:var(--white);padding:12px 24px;border:none;border-radius:8px;cursor:pointer;font-size:16px;width:100%;')">Button Style</button>
      </div>
      <div id="listStyleMenu" class="submenu">
        <button onclick="Editor.applyStyle('list-style:none;padding-left:0;')">No Bullet</button>
        <button onclick="Editor.applyStyle('list-style:circle;padding-left:20px;')">Circle</button>
        <button onclick="Editor.applyStyle('padding:20px;background:#f9f9f9;border-radius:10px;')">Card Style</button>
      </div>
    </div>

    <script>
      class HTMLEditor {
        constructor() {
          this.code = document.getElementById("code");
          this.highlight = document.getElementById("highlight");
          this.preview = document.getElementById("preview");
          this.popup = document.getElementById("popup");
          this.cursorPos = 0;

          this.init();
          this.loadDefault();
        }

        init() {
          // Event Listeners
          this.code.addEventListener("input", () => this.handleInput());
          this.code.addEventListener("scroll", () => this.syncScroll());
          this.code.addEventListener("click", (e) => this.showContextMenu(e));
          this.code.addEventListener("keyup", (e) => {
            this.cursorPos = this.code.selectionStart;
            this.debounceShowContext(e);
          });

          document.addEventListener("click", (e) => {
            if (!this.popup.contains(e.target) && !this.code.contains(e.target)) {
              this.hidePopup();
            }
          });

          // Debounce helper
          this.debounceTimeout = null;
        }

        debounceShowContext(e) {
          clearTimeout(this.debounceTimeout);
          this.debounceTimeout = setTimeout(() => this.showContextMenu(e), 100);
        }

        handleInput() {
          this.cursorPos = this.code.selectionStart;
          this.updatePreview();
        }

        syncScroll() {
          this.highlight.scrollTop = this.code.scrollTop;
          this.highlight.scrollLeft = this.code.scrollLeft;
        }

        updatePreview() {
          this.preview.srcdoc = this.code.value;
          const escaped = this.escapeHtml(this.code.value);
          this.highlight.innerHTML = this.highlightHTML(escaped);
          this.syncScroll();
        }

        escapeHtml(text) {
          return text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        highlightHTML(text) {
          // Comments
          text = text.replace(/(&lt;!--[\s\S]*?--&gt;)/g, '<span class="comment">$1</span>');

          // Tags and attributes
          text = text.replace(/(&lt;\/?[a-z0-9]+)(.*?)(&gt;)/gi, (match, start, middle, end) => {
            const attrs = middle.replace(/([a-z-]+)=(".*?")/gi, '<span class="attr">$1</span>=<span class="value">$2</span>');
            return `<span class="tag">${start}</span>${attrs}<span class="tag">${end}</span>`;
          });

          // Text content
          text = text.replace(/(&gt;)([^<]+)(&lt;)/g, (_, o, c, cl) => `${o}<span class="text">${c.trim()}</span>${cl}`);

          return text;
        }

        insertTag(tag) {
          const start = this.code.selectionStart;
          const end = this.code.selectionEnd;
          this.code.value = this.code.value.substring(0, start) + tag + this.code.value.substring(end);

          this.cursorPos = start + tag.length;
          this.code.setSelectionRange(this.cursorPos, this.cursorPos);
          this.updatePreview();
        }

        insertListItem() {
          const pos = this.code.selectionStart;
          const text = this.code.value;
          const liStart = text.lastIndexOf("<li", pos);
          const liEnd = text.indexOf("</li>", liStart);

          if (liStart !== -1 && liEnd !== -1) {
            const newItem = "\n  <li>Item baru</li>";
            this.code.value = text.substring(0, liEnd) + newItem + text.substring(liEnd);
            this.cursorPos = liEnd + newItem.length;
          }
          this.updatePreview();
          this.hidePopup();
        }

        applyStyle(style) {
          const pos = this.code.selectionStart;
          const text = this.code.value;
          const startTag = this.findStartTag(text, pos);
          const endTag = text.indexOf(">", startTag);

          if (startTag === -1 || endTag === -1) {
            this.hidePopup();
            return;
          }

          let tagContent = text.substring(startTag, endTag);
          if (tagContent.includes('style="')) {
            tagContent = tagContent.replace(/style="(.*?)"/, (match, existing) => `style="${existing.trim()} ${style}"`);
          } else {
            tagContent = tagContent + ` style="${style}"`;
          }

          this.code.value = text.substring(0, startTag) + tagContent + text.substring(endTag + 1);

          this.updatePreview();
          this.hidePopup();
        }

        findStartTag(text, pos) {
          return text.lastIndexOf("<", pos);
        }

        getCurrentTag() {
          const pos = this.code.selectionStart;
          const text = this.code.value;
          const start = this.findStartTag(text, pos);
          const end = text.indexOf(">", pos);

          if (start === -1 || end === -1) return null;

          const tagName = text
            .substring(start + 1, end)
            .split(" ")[0]
            .toLowerCase();
          return tagName;
        }

        showContextMenu(e) {
          e.stopPropagation();
          const tag = this.getCurrentTag();

          if (!tag) {
            this.hidePopup();
            return;
          }

          this.showAppropriateMenu(tag);
          this.positionPopup(e);
        }

        showAppropriateMenu(tag) {
          const menus = {
            text: ["h1", "h2", "h3", "h4", "h5", "h6", "p", "span", "a"],
            div: ["div"],
            img: ["img"],
            form: ["form", "input", "textarea", "button", "select"],
            list: ["ul", "ol", "li"],
          };

          const menuIds = ["textMenu", "divMenu", "imgMenu", "formMenu", "listMenu"];
          menuIds.forEach((id) => {
            document.getElementById(id).style.display = "none";
          });

          for (const [menu, tags] of Object.entries(menus)) {
            if (tags.includes(tag)) {
              document.getElementById(`${menu}Menu`).style.display = "block";
              return;
            }
          }

          this.hidePopup();
        }

        positionPopup(e) {
          this.popup.style.display = "block";
          this.popup.style.top = `${e.clientY + 10}px`;
          this.popup.style.left = `${e.clientX + 10}px`;
          document.querySelectorAll(".submenu").forEach((m) => (m.style.display = "none"));
        }

        showSubmenu(id) {
          document.querySelectorAll(".submenu").forEach((m) => (m.style.display = "none"));
          const submenu = document.getElementById(id);
          if (submenu) submenu.style.display = "block";
        }

        hidePopup() {
          this.popup.style.display = "none";
          document.querySelectorAll(".submenu").forEach((m) => (m.style.display = "none"));
        }

        // Content Management
        loadDefault() {
          this.code.value = this.DEFAULT_CODE;
          this.updatePreview();
        }

        loadTutorial() {
          this.code.value = this.TUTORIAL_CODE;
          this.updatePreview();
        }

        loadExample() {
          this.code.value = this.EXAMPLE_CODE;
          this.updatePreview();
        }

        reset() {
          this.code.value = this.DEFAULT_CODE;
          this.updatePreview();
        }
      }

      // Content Templates
      HTMLEditor.prototype.DEFAULT_CODE = `<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <!-- Mulai coding di sini -->
</body>
</html>`;

      HTMLEditor.prototype.TUTORIAL_CODE = `<!DOCTYPE html>

  <nav style="background:#333; text-align:center; padding:15px;">

  <!-- CONTENT -->
  <main style="max-width:1200px; margin:30px auto; padding:20px;">

    <section style="background:white; margin-bottom:20px; padding:30px; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.1);">
      <h2 style="color:#04aa6d; margin-bottom:20px;">Informasi Kampus</h2>
      <p>
        Lorem ipsum dolor sit amet, consectetur adipisicing elit. Ducimus quos tempora,
        exercitationem illum praesentium distinctio nemo ut,
        provident, neque est iste enim perspiciatis assumenda asperiores.
      </p>
    </section>

    <section style="background:white; margin-bottom:20px; padding:30px; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.1);">
      <h2 style="color:#04aa6d; margin-bottom:20px;">Daftar Dosen</h2>

      <div style="display:flex; flex-wrap:wrap; gap:20px;">
        
        <div style="flex:1; min-width:250px; background:#f8f9fa; padding:20px; border-radius:10px; border-left:5px solid #04aa6d;">
          <h3>Pak Budi Santoso</h3>
